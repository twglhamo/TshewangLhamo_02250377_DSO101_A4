name: Deploy to Render

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build verification
      run: echo "Code pushed successfully! Building and deploying..."

    - name: Verify HTML
      run: |
        if [ -f "index.html" ]; then
          echo "✓ index.html found"
        else
          echo "✗ index.html not found"
          exit 1
        fi

    - name: Verify CSS
      run: |
        if [ -f "style.css" ]; then
          echo "✓ style.css found"
        else
          echo "✗ style.css not found"
          exit 1
        fi

    - name: Success
      run: echo "✓ All checks passed! Ready for deployment on Render"
